<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dispositivos - RethaSmart</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">🚨 RethaSmart</div>
  <nav class="sidebar-menu">
    <a href="/dashboard">📊 Dashboard</a>
    <a href="/condominios">🏢 Condomínios</a>
    <a href="/dispositivos">📟 Dispositivos</a>
    <a href="/usuarios" id="menu-usuarios" style="display: none;">👥 Usuários</a>
  </nav>
  <div class="sidebar-footer">
    <button onclick="logout()">Sair do Sistema</button>
  </div>
</aside>

<main class="main-content">
  <div class="card">
    <h3>📡 Novo Dispositivo</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
      <input type="text" id="device_id" placeholder="Device ID (ex: ESP32-001)">
      <input type="text" id="nome" placeholder="Nome (ex: Portaria Principal)">
      <select id="condominio_id">
        <option value="">Selecione o condomínio</option>
      </select>
    </div>
    <button class="btn-primary" onclick="criarDispositivo()" style="width: auto;">Cadastrar Dispositivo</button>
  </div>

  <h3>Dispositivos Cadastrados</h3>
  <div id="lista" class="grid-cards"></div>
</main>

<script src="/js/auth.js"></script>
<script src="/js/dispositivos.js"></script>
<script>
  function verificarAcesso() {
    const token = localStorage.getItem('token');
    if (!token) return;
    try {
      const payloadDecoded = JSON.parse(atob(token.split('.')[1]));
      if (payloadDecoded.role === 'admin') {
        document.getElementById('menu-usuarios').style.display = 'flex';
      }
    } catch (err) { console.error(err); }
  }
  verificarAcesso();
</script>

</body>
</html>
