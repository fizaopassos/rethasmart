<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Usuários - Retha Monitor</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo-mark">r</div>
        <div class="sidebar-logo-text">retha</div>
      </div>

      <nav class="sidebar-menu">
        <a href="/dashboard">
          <span class="menu-icon">📊</span>
          <span class="menu-text">Dashboard</span>
        </a>
        <a href="/condominios">
          <span class="menu-icon">🏢</span>
          <span class="menu-text">Condomínios</span>
        </a>
        <a href="/dispositivos">
          <span class="menu-icon">📟</span>
          <span class="menu-text">Dispositivos</span>
        </a>
        <a href="/usuarios" class="active" id="menu-usuarios">
          <span class="menu-icon">👥</span>
          <span class="menu-text">Usuários</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <button onclick="logout()">
          <span class="menu-icon">↩</span>
          <span class="menu-text">Sair</span>
        </button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="page-title">
          <h1>Gestão de Usuários</h1>
          <p>Administre os acessos e permissões do sistema.</p>
        </div>
      </div>

      <div class="form-grid">
        <!-- Formulário de Criação -->
        <div class="col-4">
          <div class="card">
            <div class="section-title">
              <h3>Novo Usuário</h3>
              <p>Adicione um operador ou administrador.</p>
            </div>
            
            <label>Nome Completo</label>
            <input id="nome" placeholder="Ex: Maria Souza">
            
            <label style="margin-top: 10px;">E-mail de Acesso</label>
            <input id="email" type="email" placeholder="email@dominio.com">
            
            <label style="margin-top: 10px;">Definir Senha</label>
            <input id="senha" type="password" placeholder="Mínimo 6 caracteres">

            <label style="margin-top: 10px;">Nível de Acesso</label>
            <select id="role">
              <option value="operador">Operador (Restrito)</option>
              <option value="gerente">Gerente (Múltiplos)</option>
              <option value="admin">Administrador (Total)</option>
            </select>

            <label style="margin-top: 10px;">Vincular Condomínios (Segure CTRL)</label>
            <select id="condominios" multiple></select>

            <button class="btn-primary" style="width: 100%; margin-top: 18px;" onclick="criarUsuario()">Criar Usuário</button>
            <div id="msg" class="msg"></div>
          </div>
        </div>

        <!-- Tabela de Gestão de Usuários -->
        <div class="col-8">
          <div class="panel">
            <div class="panel-header">
              <div>
                <h3>Usuários Cadastrados</h3>
                <p>Lista de todas as contas do sistema.</p>
              </div>
            </div>
            <div class="panel-body" style="padding: 0;">
              <div class="table-container">
                <table class="data-table">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Nome</th>
                      <th>E-mail</th>
                      <th>Permissão</th>
                      <th>Ações</th>
                    </tr>
                  </thead>
                  <tbody id="lista-usuarios">
                    <tr>
                      <td colspan="5" style="text-align: center; color: var(--muted); padding: 20px;">Carregando usuários...</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
        
      </div>
    </main>
  </div>

<script src="/js/auth.js"></script>
<script>
function verificarAcesso() {
  const token = localStorage.getItem('token');
  if (!token) return window.location.href = '/login';
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    if (payload.role !== 'admin') window.location.href = '/dashboard';
  } catch (err) { window.location.href = '/login'; }
}

verificarAcesso();

function mostrarMsg(texto, tipo) {
  const el = document.getElementById('msg');
  el.innerText = texto;
  el.className = 'msg ' + tipo;
  setTimeout(() => { el.className = 'msg'; el.innerText = ''; }, 4000);
}

async function carregarCondominios() {
  try {
    const res = await fetch('/api/usuarios/condominios', { headers: authHeader() });
    const data = await res.json();
    const select = document.getElementById('condominios');
    const lista = Array.isArray(data) ? data : (data.condominios || []);
    
    lista.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.nome;
      select.appendChild(opt);
    });
  } catch(e) { console.error("Erro", e); }
}

// 🔥 NOVA FUNÇÃO: Busca e plota na tabela
async function carregarUsuarios() {
  try {
    const res = await fetch('/api/usuarios', { headers: authHeader() });
    if (res.status === 401) return logout();
    if (!res.ok) throw new Error('Falha ao listar usuários');

    const data = await res.json();
    const lista = document.getElementById('lista-usuarios');
    lista.innerHTML = '';

    if (data.length === 0) {
      lista.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 20px;">Nenhum usuário.</td></tr>';
      return;
    }

    data.forEach(user => {
      const tr = document.createElement('tr');
      let badgeClass = 'role-operador';
      if (user.role === 'admin') badgeClass = 'role-admin';
      else if (user.role === 'gerente') badgeClass = 'role-gerente';

      tr.innerHTML = `
        <td><strong>#${user.id}</strong></td>
        <td>${user.nome || '<span style="color:var(--muted)">Sem nome</span>'}</td>
        <td>${user.email}</td>
        <td><span class="badge-role ${badgeClass}">${user.role}</span></td>
        <td><button class="btn-secondary btn-small" onclick="alert('Funcionalidade de editar em breve')">Editar</button></td>
      `;
      lista.appendChild(tr);
    });
  } catch(e) {
    document.getElementById('lista-usuarios').innerHTML = '<tr><td colspan="5" style="color:red;text-align:center;">Erro ao carregar lista.</td></tr>';
  }
}

async function criarUsuario() {
  const nome = document.getElementById('nome').value;
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;
  const role = document.getElementById('role').value;
  const condSelect = document.getElementById('condominios');
  const condominios = Array.from(condSelect.selectedOptions).map(o => o.value);

  if(!email || !senha) return mostrarMsg("Preencha email e senha", "erro");

  try {
    const res = await fetch('/api/usuarios', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeader() },
      body: JSON.stringify({ nome, email, senha, role, condominios })
    });
    const data = await res.json();

    if (!res.ok) return mostrarMsg(data.erro || "Erro", 'erro');

    mostrarMsg('Usuário criado com sucesso!', 'ok');
    document.getElementById('nome').value = '';
    document.getElementById('email').value = '';
    document.getElementById('senha').value = '';
    
    // Atualiza a tabela na hora
    carregarUsuarios();
    
  } catch (err) {
    mostrarMsg('Erro no servidor', 'erro');
  }
}

carregarCondominios();
carregarUsuarios();
</script>
</body>
</html>
