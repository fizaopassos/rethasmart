<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Condomínios - Retha Monitor</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo-mark">r</div>
        <div class="sidebar-logo-text">retha</div>
      </div>

      <nav class="sidebar-menu">
        <a href="/dashboard">
          <span class="menu-icon">📊</span>
          <span class="menu-text">Dashboard</span>
        </a>
        <a href="/condominios" class="active">
          <span class="menu-icon">🏢</span>
          <span class="menu-text">Condomínios</span>
        </a>
        <a href="/dispositivos">
          <span class="menu-icon">📟</span>
          <span class="menu-text">Dispositivos</span>
        </a>
        <a href="/usuarios" id="menu-usuarios" style="display:none;">
          <span class="menu-icon">👥</span>
          <span class="menu-text">Usuários</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <button onclick="logout()">
          <span class="menu-icon">↩</span>
          <span class="menu-text">Sair</span>
        </button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="page-title">
          <h1>Condomínios</h1>
          <p>Cadastre e visualize os empreendimentos monitorados pela operação.</p>
        </div>
      </div>

      <div class="card" style="margin-bottom:18px;">
        <div class="section-title">
          <h3>Novo condomínio</h3>
          <p>Adicione um novo condomínio à base do sistema.</p>
        </div>

        <div class="form-grid">
          <div class="col-8">
            <input type="text" id="nome" placeholder="Nome do condomínio">
          </div>
          <div class="col-4">
            <button class="btn-primary" style="width:100%;" onclick="criarCondominio()">Criar condomínio</button>
          </div>
        </div>
      </div>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h3>Lista de condomínios</h3>
            <p>Empreendimentos disponíveis no sistema.</p>
          </div>
        </div>
        <div class="panel-body">
          <div id="lista" class="list-stack"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/condominios.js"></script>
  <script>
    (function() {
      const token = localStorage.getItem('token');
      if (!token) return;
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        if (payload.role === 'admin') {
          document.getElementById('menu-usuarios').style.display = 'flex';
        }
      } catch(e) {}
    })();
  </script>
</body>
</html>
